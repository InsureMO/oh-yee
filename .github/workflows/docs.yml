name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - 'packages/yee-c/**'
      - 'packages/yee-x/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # yee-x docs demos import @rainbow-oh/yee-c, whose main/module point at
      # packages/yee-c/dist — so the libraries must be built before the docs.
      - name: Build libraries
        run: pnpm build

      - name: Build yee-c docs
        run: pnpm --filter @rainbow-oh/yee-c docs:build

      - name: Build yee-x docs
        run: pnpm --filter @rainbow-oh/yee-x docs:build

      - name: Verify docs output
        run: |
          for pkg in yee-c yee-x; do
            echo "::group::ls packages/$pkg (expecting docs-dist/)"
            ls -la packages/$pkg/docs-dist >/dev/null 2>&1 || {
              echo "ERROR: packages/$pkg/docs-dist missing. Build output dirs:";
              ls -d packages/$pkg/* 2>/dev/null;
              exit 1;
            }
            echo "::endgroup::"
          done

      - name: Merge docs into site
        run: |
          mkdir -p _site
          cp -r packages/yee-c/docs-dist/* _site/
          mkdir -p _site/yee-x
          cp -r packages/yee-x/docs-dist/* _site/yee-x/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
