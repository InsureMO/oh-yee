name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - 'packages/yee-c/**'
      - 'packages/yee-x/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build yee-c docs
        run: cd packages/yee-c && npx dumi build

      - name: Build yee-x docs
        run: cd packages/yee-x && npx dumi build

      - name: Merge docs into site
        run: |
          mkdir -p _site
          cp -r packages/yee-c/docs-dist/* _site/
          mkdir -p _site/yee-x
          cp -r packages/yee-x/docs-dist/* _site/yee-x/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
